# render.yaml — Despliegue en Render.com
# Documentación: https://render.com/docs/blueprint-spec
#
# Pasos para usar:
#   1. Subir el proyecto a GitHub (privado).
#   2. En Render → New → Blueprint → conectar el repositorio.
#   3. Render leerá este archivo automáticamente.
#   4. Definir las variables de entorno marcadas como "sync: false"
#      en el panel de Render (Dashboard → Environment).

services:
  - type: web
    name: facturacion-jovi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    plan: starter        # ~$7/month — incluye disco persistente
    healthCheckPath: /

    # Disco persistente para SQLite y XMLs
    # Se monta en /data dentro del contenedor
    disk:
      name: datos-facturacion
      mountPath: /data
      sizeGB: 1

    envVars:
      # ── Rutas de datos (apuntan al disco persistente) ─────────────────────
      - key: DATABASE_PATH
        value: /data/database/facturas.db
      - key: XML_OUTPUT_DIR
        value: /data/xml_output
      - key: LOG_DIR
        value: /data/logs

      # ── Variables que debes definir en el panel de Render ─────────────────
      - key: LOYVERSE_TOKEN
        sync: false    # Definir en Dashboard → Environment
      - key: API_KEY
        sync: false    # Clave para proteger tus endpoints
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: HACIENDA_USER
        sync: false    # Cuando tengas las credenciales
      - key: HACIENDA_PASSWORD
        sync: false
      - key: HACIENDA_PIN
        sync: false
      - key: CERT_BASE64
        sync: false    # .p12 convertido a Base64

      # ── Variables con valores fijos ───────────────────────────────────────
      - key: AMBIENTE
        value: sandbox       # Cambiar a "produccion" cuando Hacienda lo apruebe
      - key: USE_MOCK
        value: "true"        # Cambiar a "false" con credenciales reales
      - key: EMISOR_CEDULA
        value: "503910760"
      - key: EMISOR_TIPO_CEDULA
        value: "01"
      - key: EMISOR_NOMBRE
        value: "Innovaciones JOVI"
      - key: EMISOR_ACTIVIDAD
        value: "523406"
      - key: EMISOR_EMAIL
        value: "innovacionesjovi.lib@gmail.com"
      - key: EMISOR_TELEFONO
        value: "83586183"
      - key: EMISOR_PROVINCIA
        value: "5"
      - key: EMISOR_CANTON
        value: "01"
      - key: EMISOR_DISTRITO
        value: "01"
      - key: EMISOR_OTRAS_SENAS
        value: "75mts sur de tienda La Nueva, contiguo a la Copa de Oro"
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_RETRIES
        value: "3"
      - key: HORA_EJECUCION
        value: "17"          # 5:00 PM hora Costa Rica
      - key: MONEDA
        value: CRC
      - key: TIPO_COMPROBANTE_CON_CEDULA
        value: "01"
      - key: DEFAULT_SUCURSAL
        value: "001"
      - key: DEFAULT_TERMINAL
        value: "00001"
      - key: LOYVERSE_CEDULA_FIELD
        value: customer_code
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_FROM_NAME
        value: "Innovaciones JOVI"
